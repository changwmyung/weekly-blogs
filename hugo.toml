baseURL = "https://digest.cwmyung.com/"
languageCode = "en-us"
title = "Chang Woo Myung — Weekly Research Digests"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

pagination.pagerSize = 20

[minify]
disableXML = true
minifyOutput = true

[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML", "RSS"]

[markup]
[markup.highlight]
codeFences = true
guessSyntax = true
lineNos = false
style = "github"
[markup.goldmark.renderer]
unsafe = true
[markup.tableOfContents]
endLevel = 4
ordered = false
startLevel = 2

[params]
env = "production"
title = "Weekly Research Digests"
description = "Curated weekly digests on MLIP, neural-network QMC, and cavity QED chemistry & physics."
author = "Chang Woo Myung (명창우)"
DateFormat = "2006-01-02"
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
math = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false

[params.assets]
disableHLJS = false
disableFingerprinting = false
favicon = "/favicon.ico"

[params.homeInfoParams]
Title = "Weekly Research Digests"
Content = """Three weekly arXiv + journals digests + 주일 설교 요약.

- **MLP** — machine-learning interatomic potentials
- **QMC** — neural-network ansätze & deep variational Monte Carlo
- **cQED** — cavity QED chemistry & physics
- **Sermons** — 주일 설교 자동 요약

Generated by Hartree, curated by Chang Woo Myung (SKKU)."""

[[params.socialIcons]]
name = "github"
url = "https://github.com/cwmyung"

[[params.socialIcons]]
name = "email"
url = "mailto:chang.w.myung@gmail.com"

